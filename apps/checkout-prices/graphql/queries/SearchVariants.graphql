query SearchVariants($channel: String!, $search: String, $first: Int!, $after: String) {
  productVariants(channel: $channel, filter: { search: $search }, first: $first, after: $after) {
    edges {
      node {
        ...VariantDetails
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
