query GetProductAttributes($productId: ID!) {
  product(id: $productId) {
    id
    name
    slug
    productType {
      name
      metadata {
        key
        value
      }
    }
    metadata {
      key
      value
    }
    # Query each file attribute part separately using attribute(slug: ...)
    # This returns SelectedAttribute with values containing file info
    files: attribute(slug: "files") {
      attribute {
        id
        slug
        name
      }
      values {
        id
        name
        slug
        file {
          url
          contentType
        }
      }
    }
    files_2: attribute(slug: "files-part-2") {
      attribute {
        id
        slug
        name
      }
      values {
        id
        name
        slug
        file {
          url
          contentType
        }
      }
    }
    files_3: attribute(slug: "files-part-3") {
      attribute {
        id
        slug
        name
      }
      values {
        id
        name
        slug
        file {
          url
          contentType
        }
      }
    }
    files_4: attribute(slug: "files-part-4") {
      attribute {
        id
        slug
        name
      }
      values {
        id
        name
        slug
        file {
          url
          contentType
        }
      }
    }
    files_5: attribute(slug: "files-part-5") {
      attribute {
        id
        slug
        name
      }
      values {
        id
        name
        slug
        file {
          url
          contentType
        }
      }
    }
  }
}
